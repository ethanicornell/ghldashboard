<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Links</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    margin:0;
    padding:4px;
    font-family:Arial,sans-serif;
    background:white;
}

.grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:8px;
    align-items:start;
}

.link-box{
    display:flex;
    align-items:center;
    justify-content:center;

    height:40px;

    background:#dbeafe;
    border:1px solid #000;
    border-radius:6px;

    color:#000;
    text-decoration:none;

    font-size:13px;
    font-weight:600;

    user-select:none;
}

.link-box:hover{
    background:#bfdbfe;
}

.link-box:active{
    background:#93c5fd;
}

/* Dropdown */

details{
    width:100%;
}

summary{
    list-style:none;
    cursor:pointer;
}

summary::-webkit-details-marker{
    display:none;
}

.dropdown{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-top:6px;
}

.dropdown .link-box{
    height:36px;
    background:#eef6ff;
}

</style>

</head>

<body>

<div class="grid">

    <details>

        <summary class="link-box">
            Go High Level ▼
        </summary>

        <div class="dropdown">

            <a class="link-box" href="https://app.gohighlevel.com/v2/location/YeOwd8tycK9E6iuyQOTb/tasks" target="_blank" rel="noopener">
                Tasks
            </a>

            <a class="link-box" href="https://app.gohighlevel.com/v2/location/YeOwd8tycK9E6iuyQOTb/opportunities/list" target="_blank" rel="noopener">
                Pipelines
            </a>

            <a class="link-box" href="https://app.gohighlevel.com/v2/location/YeOwd8tycK9E6iuyQOTb/custom-menu-link/a9ad3832-80a7-4b56-88df-7303482419f4" target="_blank" rel="noopener">
                Carrier Contacts
            </a>

        </div>

    </details>

    <details>

        <summary class="link-box">
            EZ Lynx ▼
        </summary>

        <div class="dropdown">

            <a class="link-box" href="https://google.com" target="_blank" rel="noopener">
                Pricing
            </a>

            <a class="link-box" href="https://google.com" target="_blank" rel="noopener">
                SOPs
            </a>

        </div>

    </details>

    <details>

        <summary class="link-box">
            Outlook ▼
        </summary>

        <div class="dropdown">

            <a class="link-box" href="https://outlook.office.com/mail/inbox" target="_blank" rel="noopener">
                Mail
            </a>

            <a class="link-box" href="https://outlook.cloud.microsoft/calendar/?ui=en-US&rs=US" target="_blank" rel="noopener">
                Calendar
            </a>

        </div>

    </details>

    <a class="link-box" href="https://secure.mortgage.meridianlink.com" target="_blank" rel="noopener">
        Meridian Link
    </a>

    <a class="link-box" href="https://google.com" target="_blank" rel="noopener">
        Placeholder
    </a>

    <a class="link-box" href="https://google.com" target="_blank" rel="noopener">
        Placeholder
    </a>

</div>

</body>

</html>
