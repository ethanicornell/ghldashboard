<!DOCTYPE html>
<html>

<head>

<title>Dashboard Widgets</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    margin:20px;
}

h1{
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.card{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
}

a{
    display:block;
    text-decoration:none;
    color:white;
    margin-top:8px;
}

</style>

</head>

<body>

<h1>Quick Links</h1>

<div class="grid">

<div class="card">
<h2>CRM</h2>

<a href="#">Pipeline</a>
<a href="#">Contacts</a>
<a href="#">Calendar</a>

</div>

<div class="card">

<h2>Resources</h2>

<a href="#">Pricing Sheet</a>
<a href="#">SOPs</a>
<a href="#">Training</a>

</div>

</div>

</body>

</html>
