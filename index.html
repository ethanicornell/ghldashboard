<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Links</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    padding:12px;
    font-family:Arial,sans-serif;
    background:white;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.link-box{
    display:flex;
    align-items:center;
    justify-content:center;

    height:48px;

    border:1px solid #d9d9d9;
    border-radius:8px;

    color:#222;
    text-decoration:none;

    font-size:14px;
    font-weight:600;

    user-select:none;
}

.link-box:hover{
    background:#f5f5f5;
}

.link-box:active{
    background:#e9e9e9;
}

</style>

</head>


<body>

<div class="grid">

    <a class="link-box" href="#">
        Pipeline
    </a>

    <a class="link-box" href="#">
        Contacts
    </a>

    <a class="link-box" href="#">
        Calendar
    </a>

    <a class="link-box" href="#">
        Tasks
    </a>

    <a class="link-box" href="#">
        Pricing
    </a>

    <a class="link-box" href="#">
        Knowledge Base
    </a>

</div>

</body>

</html>
