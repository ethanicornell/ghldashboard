<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Links</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    margin:0;
    padding:4px;
    font-family:Arial,sans-serif;
    background:white;
}

.grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:8px;
}

.link-box{
    display:flex;
    align-items:center;
    justify-content:center;

    height:40px;

    background:#dbeafe;
    border:1px solid #000;
    border-radius:6px;

    color:#000;
    text-decoration:none;

    font-size:13px;
    font-weight:600;

    user-select:none;
}

.link-box:hover{
    background:#bfdbfe;
}

.link-box:active{
    background:#93c5fd;
}

</style>

</head>

<body>

<div class="grid">

<a class="link-box" href="#">
Pipeline
</a>

<a class="link-box" href="#">
Contacts
</a>

<a class="link-box" href="#">
Calendar
</a>

<a class="link-box" href="#">
Tasks
</a>

<a class="link-box" href="#">
Pricing
</a>

<a class="link-box" href="#">
Knowledge Base
</a>

</div>

</body>

</html>
